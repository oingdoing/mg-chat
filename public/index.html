<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🥸 맹구와 토킹어바웃</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section id="homeSection" class="card">
        <div class="page-title">
          <h1>맹구와 토킹어바웃</h1>
          <p class="muted">링크 공유 + 입장코드로 4명까지 참여할 수 있습니다.</p>
        </div>
        <form id="goRoomForm" class="row">
          <input
            id="roomIdInput"
            name="roomId"
            type="text"
            placeholder="방 ID 입력"
            maxlength="40"
            required
          />
          <button class="btn" type="submit">시작</button>
        </form>
      </section>

      <section id="chatSection" class="card hidden">
        <header class="chatHeader">
          <div id="roomInfoBlock">
            <h2 id="roomTitle">😎</h2>
            <p class="muted" id="roomHint"></p>
          </div>
        </header>

        <div id="joinPanel" class="joinPanel">
          <h3>입장 정보 입력</h3>
          <p class="muted">방이 처음 생성되는 경우 입력한 코드가 방 코드로 설정됩니다.</p>
          <form id="joinForm" class="joinForm">
            <label>
              닉네임
              <input id="nicknameInput" type="text" maxlength="20" required />
            </label>
            <label>
              입장코드
              <input id="codeInput" type="password" maxlength="20" required />
            </label>
            <button class="btn primary" type="submit">입장하기</button>
          </form>
        </div>

        <div id="chatPanel" class="chatPanel hidden">
          <aside class="sidebar">
            <h4>접속자 (<span id="userCount">0</span>/4)</h4>
            <ul id="userList"></ul>
            <div class="shareBox">
              <p class="muted">공유 링크</p>
              <input id="shareLink" type="text" readonly />
              <button id="copyLinkBtn" class="btn" type="button">링크 복사</button>
            </div>
          </aside>

          <section class="chatMain">
            <button
              id="toggleSidebarBtn"
              class="chatIconBtn chatIconInfo"
              type="button"
              aria-expanded="true"
              aria-label="정보 접기"
              title="정보 접기"
            >
              i
            </button>
            <button
              id="leaveBtn"
              class="chatIconBtn chatIconLeave"
              type="button"
              aria-label="채팅방 나가기"
              title="채팅방 나가기"
            >
              X
            </button>
            <ul id="messages" class="messages"></ul>

            <form id="messageForm" class="messageForm">
              <textarea
                id="messageInput"
                rows="2"
                maxlength="500"
                placeholder="메시지를 입력하세요. Enter 전송 / Alt+Enter 줄바꿈"
              ></textarea>
            </form>
          </section>
        </div>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
